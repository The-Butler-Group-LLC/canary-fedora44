name: fedora44 Runtime Scan

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            curl \
            openssh-client \
            netcat-openbsd \
            ca-certificates

      - name: Download image
        run: |
          curl -L --retry 5 -o fedora44.raw.xz \
            https://builds.coreos.fedoraproject.org/prod/streams/stable/builds/44.20260419.3.1/x86_64/fedora-coreos-44.20260419.3.1-qemu.x86_64.qcow2.xz
          unxz fedora44.raw.xz
          qemu-img convert -O qcow2 fedora44.raw fedora44.img
      - name: Generate SSH key
        run: |
          ssh-keygen -t rsa -b 4096 -f id_rsa -N ""

      - name: Create Ignition config
        run: |
          PUBKEY=$(cat id_rsa.pub)

          cat > config.ign <<EOF
          {
            "ignition": { "version": "3.4.0" },
            "passwd": {
              "users": [
                {
                  "name": "core",
                  "sshAuthorizedKeys": ["$PUBKEY"],
                  "groups": ["wheel"]
                }
              ]
            }
          }
          EOF

      - name: Start fedora44 VM
        run: |
          qemu-system-x86_64 \
            -m 2048 \
            -smp 2 \
            -machine type=q35,accel=tcg \
            -cpu max \
            -drive file=fedora44.img,format=qcow2,if=virtio \
            -fw_cfg name=opt/com.coreos/config,file=config.ign \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -nographic \
            -serial mon:stdio \
            > vm.log 2>&1 &

          echo $! > vm.pid

      - name: Wait for SSH to be fully ready
        run: |
          for i in {1..120}; do
            if ssh -i id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=2 \
              -o BatchMode=yes \
              -p 2222 core@localhost "echo ready" >/dev/null 2>&1; then
              echo "✅ SSH is fully ready"
              exit 0
            fi
            echo "⏳ Waiting for SSH..."
            sleep 2
          done
          echo "❌ SSH failed to become ready"
          exit 1

      - name: Dump VM logs
        if: failure()
        run: cat vm.log || true

      - name: Generate SBOM inside VM
        run: |
          ssh -i id_rsa -p 2222 core@localhost <<'EOF'
          set -e

          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

          # Generate SBOM (CycloneDX format is well-supported)
          sudo ./bin/trivy rootfs / \
            --format cyclonedx \
            --scanners vuln \
            --output /tmp/sbom.json
          EOF

      - name: Copy SBOM from VM
        run: |
          scp -i id_rsa -P 2222 \
            -o StrictHostKeyChecking=no \
            core@localhost:/tmp/sbom.json \
            sbom.json

      - name: Install Trivy on runner
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

      - name: Scan SBOM with Trivy
        run: |
          ./bin/trivy sbom sbom.json \
            --scanners vuln \
            -f sarif \
            -o report.sarif

      - name: Stop VM
        if: always()
        run: |
          kill $(cat vm.pid) || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: report.sarif
